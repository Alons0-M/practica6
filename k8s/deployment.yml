apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital
  template:
    metadata:
      labels:
        app: hospital
    spec:
      containers:
      - name: hospital-container
        image: alonsom0/practica-hospital:latest # Cambia esto
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hospital-service
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30001
  selector:
    app: hospital
